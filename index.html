<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant RH</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #00C9A7; --teal-dark: #00A88C;
      --navy: #0B1629; --navy-mid: #112240;
      --white: #F0F4FF; --muted: #8899BB;
      --error: #FF5C7A; --user-bg: #1D3461; --bot-bg: #0F1E38;
      --font: 'Plus Jakarta Sans', sans-serif;
    }
    body { font-family: var(--font); background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .page-content { text-align: center; color: #334155; }
    .page-content h1 { font-size: 2.5rem; font-weight: 700; color: #0f172a; margin-bottom: 1rem; }
    .page-content p { font-size: 1.1rem; color: #64748b; max-width: 500px; line-height: 1.7; }

    /* BULLE */
    .chat-bubble { position: fixed; bottom: 28px; right: 28px; width: 62px; height: 62px; border-radius: 50%; background: linear-gradient(135deg, var(--teal), var(--teal-dark)); box-shadow: 0 8px 32px #00C9A755, 0 2px 8px #0003; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1000; transition: transform 0.2s, box-shadow 0.2s; border: none; outline: none; }
    .chat-bubble:hover { transform: scale(1.08); box-shadow: 0 12px 40px #00C9A777, 0 2px 8px #0003; }
    .chat-bubble svg { width: 28px; height: 28px; }
    .chat-bubble .close-icon { display: none; }
    .chat-bubble.open .chat-icon { display: none; }
    .chat-bubble.open .close-icon { display: block; }
    .bubble-badge { position: absolute; top: -2px; right: -2px; width: 18px; height: 18px; background: #FF5C7A; border-radius: 50%; border: 2px solid #f0f4f8; display: none; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; }
    .bubble-badge.show { display: flex; }
    .bubble-tooltip { position: absolute; right: 72px; bottom: 50%; transform: translateY(50%); background: var(--navy); color: var(--white); padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 500; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.2s; box-shadow: 0 4px 16px #0003; }
    .bubble-tooltip::after { content: ''; position: absolute; right: -6px; top: 50%; transform: translateY(-50%); border: 6px solid transparent; border-right: none; border-left-color: var(--navy); }
    .chat-bubble:hover .bubble-tooltip { opacity: 1; }

    /* FENETRE */
    .chat-window { position: fixed; bottom: 104px; right: 28px; width: 370px; height: 540px; background: var(--navy); border-radius: 24px; box-shadow: 0 24px 80px #0009, 0 4px 24px #00C9A722; display: flex; flex-direction: column; overflow: hidden; z-index: 999; transform: scale(0.85) translateY(20px); transform-origin: bottom right; opacity: 0; pointer-events: none; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s; border: 1px solid #ffffff10; }
    .chat-window.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }

    /* HEADER */
    .chat-header { background: linear-gradient(135deg, #0d2040, #112240); padding: 14px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #ffffff10; flex-shrink: 0; }
    .header-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--teal), var(--teal-dark)); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; box-shadow: 0 0 0 3px #00C9A730; }
    .header-info { flex: 1; }
    .header-name { font-size: 14px; font-weight: 700; color: var(--white); }
    .header-status { font-size: 11px; color: var(--teal); display: flex; align-items: center; gap: 5px; margin-top: 2px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .header-btn { width: 30px; height: 30px; border-radius: 50%; background: #ffffff10; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--muted); transition: background .2s, color .2s; }
    .header-btn:hover { background: #ffffff20; color: var(--white); }

    /* MESSAGES */
    .chat-messages { flex: 1; overflow-y: auto; padding: 14px 12px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #ffffff20; border-radius: 4px; }
    .msg { display: flex; gap: 8px; align-items: flex-end; animation: msgIn .3s ease; }
    @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .msg.bot .msg-avatar { background: linear-gradient(135deg, var(--teal), var(--teal-dark)); color: var(--navy); }
    .msg.user .msg-avatar { background: var(--user-bg); color: var(--teal); }
    .msg-body { max-width: 82%; }
    .msg-bubble { padding: 9px 13px; border-radius: 15px; font-size: 13px; line-height: 1.55; word-break: break-word; }
    .msg.bot .msg-bubble { background: var(--bot-bg); color: var(--white); border-bottom-left-radius: 4px; border: 1px solid #ffffff08; }
    .msg.user .msg-bubble { background: var(--teal); color: var(--navy); border-bottom-right-radius: 4px; font-weight: 500; }
    .msg.error .msg-bubble { background: #FF5C7A15; color: var(--error); border: 1px solid #FF5C7A30; }
    .msg-time { font-size: 10px; color: var(--muted); margin-top: 3px; padding: 0 3px; }
    .msg.user .msg-time { text-align: right; }
    .typing-indicator { display: flex; gap: 4px; padding: 10px 13px; background: var(--bot-bg); border-radius: 15px; border-bottom-left-radius: 4px; width: fit-content; border: 1px solid #ffffff08; }
    .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: typingBounce 1.2s infinite; }
    .typing-dot:nth-child(2){animation-delay:.2s} .typing-dot:nth-child(3){animation-delay:.4s}
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-5px);opacity:1} }

    /* CHIPS */
    .chips { display: flex; flex-wrap: wrap; gap: 5px; padding: 8px 12px 4px; flex-shrink: 0; border-top: 1px solid #ffffff08; }
    .chip { background: #ffffff08; border: 1px solid #ffffff15; color: var(--muted); font-size: 11px; padding: 4px 9px; border-radius: 20px; cursor: pointer; transition: all .2s; font-family: var(--font); white-space: nowrap; }
    .chip:hover { background: var(--teal); border-color: var(--teal); color: var(--navy); font-weight: 600; }

    /* INPUT */
    .chat-input-area { padding: 8px 10px 12px; display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; border-top: 1px solid #ffffff08; }
    .chat-textarea { flex: 1; background: #ffffff0d; border: 1px solid #ffffff15; border-radius: 12px; padding: 9px 13px; color: var(--white); font-family: var(--font); font-size: 13px; resize: none; outline: none; min-height: 40px; max-height: 90px; transition: border-color .2s; line-height: 1.5; }
    .chat-textarea::placeholder { color: var(--muted); }
    .chat-textarea:focus { border-color: var(--teal); }
    .send-btn { width: 40px; height: 40px; border-radius: 11px; background: var(--teal); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .2s, transform .15s; }
    .send-btn:hover { background: var(--teal-dark); transform: scale(1.05); }
    .send-btn:active { transform: scale(0.95); }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: #000a; z-index: 2000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); animation: fadeIn .2s; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .modal-overlay.hidden { display: none; }
    .modal { background: var(--navy-mid); border-radius: 20px; padding: 30px 26px; width: min(400px,92vw); border: 1px solid #ffffff15; box-shadow: 0 32px 80px #0009; animation: modalIn .3s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes modalIn { from{transform:scale(.9) translateY(20px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }
    .modal-icon { width: 52px; height: 52px; background: linear-gradient(135deg, var(--teal), var(--teal-dark)); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 18px; }
    .modal h2 { text-align: center; font-size: 1.25rem; font-weight: 700; color: var(--white); margin-bottom: 5px; }
    .modal p { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 22px; }
    .modal label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 5px; }
    .modal input { width: 100%; background: #ffffff0d; border: 1px solid #ffffff15; border-radius: 11px; padding: 11px 13px; color: var(--white); font-family: var(--font); font-size: 13px; outline: none; margin-bottom: 14px; transition: border-color .2s; }
    .modal input:focus { border-color: var(--teal); }
    .modal input::placeholder { color: #4a5a7a; }
    .modal-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--teal), var(--teal-dark)); border: none; border-radius: 11px; color: var(--navy); font-family: var(--font); font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .2s, transform .15s; }
    .modal-btn:hover { opacity: .92; transform: translateY(-1px); }

    @media (max-width: 480px) {
      .chat-window { right:0; bottom:0; width:100vw; height:100dvh; border-radius:0; }
      .chat-bubble { bottom:20px; right:20px; }
    }
  </style>
</head>
<body>

<div class="page-content">
  <h1>Bienvenue 👋</h1>
  <p>Votre espace RH. Posez vos questions à l'assistant en bas à droite.</p>
</div>

<!-- Bulle -->
<button class="chat-bubble" id="chatBubble" onclick="toggleChat()">
  <div class="bubble-tooltip">Assistant RH</div>
  <div class="bubble-badge" id="bubbleBadge">1</div>
  <svg class="chat-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  <svg class="close-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
</button>

<!-- Fenêtre chat -->
<div class="chat-window" id="chatWindow">
  <div class="chat-header">
    <div class="header-avatar">🤖</div>
    <div class="header-info">
      <div class="header-name">Assistant RH</div>
      <div class="header-status"><div class="status-dot"></div>En ligne · 24h/24</div>
    </div>
    <button class="header-btn" onclick="openConfig()" title="Paramètres">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="chips">
    <button class="chip" onclick="quickSend('Combien de jours de congés ai-je ?')">🌴 Congés</button>
    <button class="chip" onclick="quickSend('Comment fonctionne l\'onboarding ?')">🎯 Onboarding</button>
    <button class="chip" onclick="quickSend('Comment rembourser mes frais ?')">💰 Frais</button>
    <button class="chip" onclick="quickSend('Quels sont les horaires ?')">🕐 Horaires</button>
  </div>

  <div class="chat-input-area">
    <textarea class="chat-textarea" id="chatInput" placeholder="Posez votre question RH…" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendMessage()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#0B1629" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<!-- Modal Config -->
<div class="modal-overlay hidden" id="configModal">
  <div class="modal">
    <div class="modal-icon">⚙️</div>
    <h2>Configuration</h2>
    <p>Entrez l'URL du webhook n8n et votre nom</p>
    <label>URL Webhook n8n</label>
    <input type="url" id="webhookInput" placeholder="https://xxx.app.n8n.cloud/webhook/agent-rh" />
    <label>Votre nom</label>
    <input type="text" id="userNameInput" placeholder="Votre prénom" />
    <button class="modal-btn" onclick="saveConfig()">Connecter l'agent RH →</button>
  </div>
</div>

<script>
  let WEBHOOK_URL = localStorage.getItem('rh_webhook') || '';
  let USER_NAME   = localStorage.getItem('rh_username') || 'Employé';
  let sessionId   = 'web-' + Date.now();
  let conversationHistory = [];
  let isOpen = false;

  window.addEventListener('load', () => {
    if (!WEBHOOK_URL) {
      setTimeout(() => { showBadge(); }, 1500);
      setTimeout(() => openConfig(), 600);
    } else {
      setTimeout(() => {
        showBadge();
        addMessage(`Bonjour ${USER_NAME.split(' ')[0]} ! 👋 Comment puis-je vous aider aujourd'hui ?`, 'bot');
      }, 800);
    }
  });

  function toggleChat() {
    isOpen = !isOpen;
    document.getElementById('chatWindow').classList.toggle('open', isOpen);
    document.getElementById('chatBubble').classList.toggle('open', isOpen);
    hideBadge();
    if (isOpen) { setTimeout(() => document.getElementById('chatInput').focus(), 300); scrollToBottom(); }
  }

  function showBadge() { document.getElementById('bubbleBadge').classList.add('show'); }
  function hideBadge() { document.getElementById('bubbleBadge').classList.remove('show'); }

  function openConfig() {
    document.getElementById('webhookInput').value = WEBHOOK_URL;
    document.getElementById('userNameInput').value = USER_NAME !== 'Employé' ? USER_NAME : '';
    document.getElementById('configModal').classList.remove('hidden');
  }

  function saveConfig() {
    const url  = document.getElementById('webhookInput').value.trim();
    const name = document.getElementById('userNameInput').value.trim();
    if (!url) { alert('Veuillez entrer l\'URL du webhook.'); return; }
    WEBHOOK_URL = url;
    USER_NAME   = name || 'Employé';
    localStorage.setItem('rh_webhook',  WEBHOOK_URL);
    localStorage.setItem('rh_username', USER_NAME);
    document.getElementById('configModal').classList.add('hidden');
    const msgs = document.getElementById('messages');
    if (!msgs.children.length) addMessage(`Bonjour ${USER_NAME.split(' ')[0]} ! 👋 Comment puis-je vous aider ?`, 'bot');
    if (!isOpen) toggleChat();
  }

  function quickSend(text) {
    if (!isOpen) toggleChat();
    setTimeout(() => { document.getElementById('chatInput').value = text; sendMessage(); }, 150);
  }

  async function sendMessage() {
    if (!WEBHOOK_URL) { openConfig(); return; }
    const input = document.getElementById('chatInput');
    const text  = input.value.trim();
    if (!text) return;
    input.value = ''; autoResize(input);
    addMessage(text, 'user');
    const typingId = addTyping();
    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text, userId: sessionId, userName: USER_NAME, channel: 'web',
          history: conversationHistory.slice(-6).map(m => ({ role: m.who === 'user' ? 'user' : 'model', content: m.text }))
        })
      });
      removeTyping(typingId);
      const rawText = await res.text();
      if (!rawText || !rawText.trim()) { addMessage('Réponse vide. Vérifiez le nœud "Répondre au site web" dans n8n.', 'bot', true); return; }
      let data;
      try { data = JSON.parse(rawText); } catch(e) { addMessage(rawText, 'bot'); return; }
      addMessage(data.reply || data.message || data.text || rawText, 'bot');
    } catch(err) {
      removeTyping(typingId);
      addMessage('Impossible de joindre l\'agent RH. Vérifiez l\'URL dans ⚙️ Paramètres.', 'bot', true);
    }
  }

  function addMessage(text, who, isError = false) {
    if (!isError) { conversationHistory.push({ who, text }); if (conversationHistory.length > 20) conversationHistory.shift(); }
    const box  = document.getElementById('messages');
    const now  = new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
    const icon = who === 'bot' ? '🤖' : (USER_NAME.charAt(0).toUpperCase() || '👤');
    const msg  = document.createElement('div');
    msg.className = `msg ${who}${isError ? ' error' : ''}`;
    msg.innerHTML = `<div class="msg-avatar">${icon}</div><div class="msg-body"><div class="msg-bubble">${formatText(text)}</div><div class="msg-time">${now}</div></div>`;
    box.appendChild(msg);
    scrollToBottom();
    if (!isOpen && who === 'bot') showBadge();
  }

  function addTyping() {
    const box = document.getElementById('messages');
    const id  = 'typing-' + Date.now();
    const el  = document.createElement('div');
    el.className = 'msg bot'; el.id = id;
    el.innerHTML = `<div class="msg-avatar">🤖</div><div class="msg-body"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
    box.appendChild(el); scrollToBottom(); return id;
  }

  function removeTyping(id) { const el = document.getElementById(id); if (el) el.remove(); }
  function scrollToBottom() { const b = document.getElementById('messages'); setTimeout(() => b.scrollTop = b.scrollHeight, 50); }
  function formatText(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>'); }
  function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,90)+'px'; }
  function handleKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
</script>
</body>
</html>
