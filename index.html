<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant RH – IA Interne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

  <style>
    /* ─── TOKENS ─────────────────────────────────────── */
    :root {
      --navy:       #0B1629;
      --navy-mid:   #112240;
      --navy-light: #1D3461;
      --teal:       #00C9A7;
      --teal-dim:   #00C9A720;
      --teal-glow:  #00C9A740;
      --gold:       #F5C842;
      --white:      #F0F4FF;
      --white-dim:  #F0F4FF90;
      --muted:      #8899BB;
      --error:      #FF5C7A;
      --user-bg:    #1D3461;
      --bot-bg:     #0F1E38;
      --radius:     16px;
      --radius-sm:  10px;
      --font-head:  'Syne', sans-serif;
      --font-body:  'DM Sans', sans-serif;
      --shadow:     0 8px 40px #00000055;
      --glow:       0 0 30px #00C9A730;
    }

    /* ─── RESET ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: var(--font-body);
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ─── BACKGROUND GRID ────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--teal-dim) 1px, transparent 1px),
        linear-gradient(90deg, var(--teal-dim) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 800px; height: 800px;
      background: radial-gradient(circle, #00C9A712 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── LAYOUT ─────────────────────────────────────── */
    .app {
      position: relative; z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
    }

    /* ─── HEADER ─────────────────────────────────────── */
    header {
      padding: 20px 28px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #ffffff0f;
      backdrop-filter: blur(12px);
      background: #0B162988;
      position: sticky; top: 0; z-index: 10;
    }

    .header-left { display: flex; align-items: center; gap: 14px; }

    .logo-ring {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--teal), var(--navy-light));
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: var(--glow);
      animation: pulse-ring 3s ease-in-out infinite;
    }
    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 0 var(--teal-glow), var(--glow); }
      50%       { box-shadow: 0 0 0 8px transparent, var(--glow); }
    }

    .header-title h1 {
      font-family: var(--font-head);
      font-size: 17px; font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--white);
    }
    .header-title p {
      font-size: 12px; color: var(--muted);
      font-weight: 300; margin-top: 1px;
    }

    .status-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--teal); font-weight: 500;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--teal);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* ─── QUICK TOPICS ───────────────────────────────── */
    .topics-bar {
      padding: 12px 28px;
      display: flex; gap: 8px; flex-wrap: wrap;
      border-bottom: 1px solid #ffffff08;
      background: #0B162960;
    }
    .topic-chip {
      padding: 5px 13px;
      border-radius: 99px;
      border: 1px solid #ffffff14;
      background: #ffffff07;
      color: var(--white-dim);
      font-size: 12px; font-family: var(--font-body);
      cursor: pointer;
      transition: all .2s ease;
      white-space: nowrap;
    }
    .topic-chip:hover {
      border-color: var(--teal);
      background: var(--teal-dim);
      color: var(--teal);
      transform: translateY(-1px);
    }

    /* ─── MESSAGES AREA ──────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 28px 8px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #ffffff20; border-radius: 99px; }

    /* ─── MESSAGE BUBBLES ────────────────────────────── */
    .msg { display: flex; gap: 10px; align-items: flex-end; animation: slideUp .3s ease; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .msg.bot  .msg-avatar { background: linear-gradient(135deg, var(--teal), #0099FF); }
    .msg.user .msg-avatar { background: linear-gradient(135deg, var(--gold), #FF9F43); }

    .msg-bubble {
      max-width: 72%;
      padding: 13px 17px;
      border-radius: var(--radius);
      font-size: 14.5px; line-height: 1.65;
      font-weight: 300;
    }
    .msg.bot .msg-bubble {
      background: var(--bot-bg);
      border: 1px solid #ffffff0d;
      border-bottom-left-radius: 4px;
      color: var(--white);
    }
    .msg.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid #ffffff14;
      border-bottom-right-radius: 4px;
      color: var(--white);
    }

    .msg-meta {
      font-size: 10.5px; color: var(--muted);
      margin-top: 5px;
      text-align: right;
    }
    .msg.bot .msg-meta { text-align: left; }

    /* ─── TYPING INDICATOR ───────────────────────────── */
    .typing-dots {
      display: flex; gap: 4px; align-items: center;
      padding: 14px 18px;
    }
    .typing-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--teal);
      animation: bounce 1.4s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .4; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ─── DIVIDER DATE ───────────────────────────────── */
    .date-divider {
      display: flex; align-items: center; gap: 12px;
      color: var(--muted); font-size: 11px;
    }
    .date-divider::before,
    .date-divider::after { content: ''; flex: 1; height: 1px; background: #ffffff0d; }

    /* ─── INPUT AREA ─────────────────────────────────── */
    .input-section {
      padding: 16px 28px 24px;
      background: #0B162988;
      backdrop-filter: blur(12px);
      border-top: 1px solid #ffffff0f;
    }

    .input-wrap {
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--navy-mid);
      border: 1px solid #ffffff14;
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color .2s ease, box-shadow .2s ease;
    }
    .input-wrap:focus-within {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px var(--teal-dim);
    }

    #userInput {
      flex: 1;
      background: transparent;
      border: none; outline: none;
      color: var(--white);
      font-family: var(--font-body);
      font-size: 14.5px; font-weight: 300;
      resize: none; max-height: 120px; min-height: 22px;
      line-height: 1.5;
    }
    #userInput::placeholder { color: var(--muted); }

    .send-btn {
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--teal);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s ease;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #00e6bf; transform: scale(1.05); }
    .send-btn:active { transform: scale(.95); }
    .send-btn svg { width: 16px; height: 16px; fill: var(--navy); }

    .input-hint {
      margin-top: 8px;
      font-size: 11px; color: var(--muted);
      text-align: center;
    }
    .input-hint kbd {
      padding: 1px 5px;
      border: 1px solid #ffffff18;
      border-radius: 4px;
      font-size: 10px;
      font-family: var(--font-body);
      color: var(--muted);
    }

    /* ─── WELCOME STATE ──────────────────────────────── */
    .welcome {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      flex: 1;
      gap: 16px;
      padding: 40px 28px;
      animation: fadeIn .6s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .welcome-icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, var(--teal), #0055FF);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      box-shadow: var(--glow), var(--shadow);
    }
    .welcome h2 {
      font-family: var(--font-head);
      font-size: 24px; font-weight: 800;
      text-align: center;
    }
    .welcome p {
      color: var(--muted); font-size: 14px;
      text-align: center; max-width: 400px; line-height: 1.7;
    }

    .welcome-cards {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; width: 100%; max-width: 500px;
    }
    .welcome-card {
      background: var(--bot-bg);
      border: 1px solid #ffffff0d;
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      cursor: pointer;
      transition: all .2s ease;
    }
    .welcome-card:hover {
      border-color: var(--teal);
      background: var(--teal-dim);
      transform: translateY(-2px);
      box-shadow: var(--glow);
    }
    .welcome-card .card-icon { font-size: 20px; margin-bottom: 6px; }
    .welcome-card .card-label { font-size: 12.5px; color: var(--white-dim); line-height: 1.4; }

    /* ─── MODAL CONFIG ───────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: #00000099;
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      animation: fadeIn .2s ease;
    }
    .modal-overlay.hidden { display: none; }

    .modal {
      background: var(--navy-mid);
      border: 1px solid #ffffff14;
      border-radius: 20px;
      padding: 32px;
      width: 90%; max-width: 440px;
      box-shadow: var(--shadow);
    }
    .modal h3 { font-family: var(--font-head); font-size: 20px; margin-bottom: 6px; }
    .modal p  { font-size: 13px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }

    .form-group { margin-bottom: 16px; }
    .form-group label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 11px 14px;
      background: var(--navy);
      border: 1px solid #ffffff14;
      border-radius: var(--radius-sm);
      color: var(--white);
      font-family: var(--font-body);
      font-size: 13.5px;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus { border-color: var(--teal); }
    .form-group input::placeholder { color: var(--muted); }

    .modal-btn {
      width: 100%; padding: 12px;
      background: var(--teal);
      border: none; border-radius: var(--radius-sm);
      color: var(--navy);
      font-family: var(--font-head);
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      margin-top: 4px;
    }
    .modal-btn:hover { background: #00e6bf; }

    /* ─── SETTINGS BTN ───────────────────────────────── */
    .settings-btn {
      background: transparent;
      border: 1px solid #ffffff12;
      border-radius: 8px;
      padding: 7px 10px;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      transition: all .2s;
      display: flex; align-items: center; gap: 6px;
      font-family: var(--font-body);
      font-size: 12px;
    }
    .settings-btn:hover { border-color: var(--teal); color: var(--teal); }

    /* ─── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 600px) {
      header, .topics-bar, #messages, .input-section { padding-left: 16px; padding-right: 16px; }
      .welcome-cards { grid-template-columns: 1fr; }
      .msg-bubble { max-width: 88%; }
    }
  </style>
</head>
<body>

<!-- CONFIG MODAL -->
<div class="modal-overlay" id="configModal">
  <div class="modal">
    <h3>⚙️ Configuration</h3>
    <p>Entrez l'URL de votre webhook n8n pour connecter l'agent RH.</p>
    <div class="form-group">
      <label>URL Webhook n8n</label>
      <input type="url" id="webhookInput"
        placeholder="https://votre-instance.n8n.cloud/webhook/agent-rh" />
    </div>
    <div class="form-group">
      <label>Votre nom (optionnel)</label>
      <input type="text" id="userNameInput" placeholder="Ex : Marie Dupont" />
    </div>
    <button class="modal-btn" onclick="saveConfig()">Connecter l'agent RH →</button>
  </div>
</div>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="logo-ring">🤖</div>
      <div class="header-title">
        <h1>Assistant RH</h1>
        <p>Propulsé par IA · Disponible 24h/24</p>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="status-badge">
        <div class="status-dot"></div>
        <span id="statusText">En ligne</span>
      </div>
      <button class="settings-btn" onclick="openConfig()">
        ⚙️ Paramètres
      </button>
    </div>
  </header>

  <!-- QUICK TOPICS -->
  <div class="topics-bar">
    <button class="topic-chip" onclick="quickAsk('Combien de jours de congés ai-je par an ?')">🌴 Congés</button>
    <button class="topic-chip" onclick="quickAsk('Comment fonctionne l\'onboarding ?')">🎯 Onboarding</button>
    <button class="topic-chip" onclick="quickAsk('Quelles sont les procédures de remboursement de frais ?')">💰 Notes de frais</button>
    <button class="topic-chip" onclick="quickAsk('Quelles sont les horaires de travail ?')">🕐 Horaires</button>
    <button class="topic-chip" onclick="quickAsk('Comment contacter le service RH ?')">📞 Contact RH</button>
    <button class="topic-chip" onclick="quickAsk('Quelle est la politique de télétravail ?')">🏠 Télétravail</button>
  </div>

  <!-- MESSAGES -->
  <div id="messages">
    <!-- Welcome state shown by JS -->
  </div>

  <!-- INPUT -->
  <div class="input-section">
    <div class="input-wrap">
      <textarea id="userInput" rows="1"
        placeholder="Posez votre question RH..."
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMessage()" title="Envoyer">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Appuyez sur <kbd>Entrée</kbd> pour envoyer · <kbd>Shift+Entrée</kbd> pour un saut de ligne</p>
  </div>

</div>

<script>
// ─── STATE ──────────────────────────────────────────────
let WEBHOOK_URL = localStorage.getItem('rh_webhook') || '';
let USER_NAME   = localStorage.getItem('rh_username') || 'Employé';
let sessionId   = 'web-' + Date.now();
let hasMessages = false;

// ─── INIT ────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (!WEBHOOK_URL) {
    document.getElementById('configModal').classList.remove('hidden');
  } else {
    showWelcome();
  }
});

function saveConfig() {
  const url  = document.getElementById('webhookInput').value.trim();
  const name = document.getElementById('userNameInput').value.trim();
  if (!url) { alert('Veuillez entrer l\'URL du webhook.'); return; }
  WEBHOOK_URL = url;
  USER_NAME   = name || 'Employé';
  localStorage.setItem('rh_webhook',  WEBHOOK_URL);
  localStorage.setItem('rh_username', USER_NAME);
  document.getElementById('configModal').classList.add('hidden');
  showWelcome();
}

function openConfig() {
  document.getElementById('webhookInput').value = WEBHOOK_URL;
  document.getElementById('userNameInput').value = USER_NAME;
  document.getElementById('configModal').classList.remove('hidden');
}

// ─── WELCOME ─────────────────────────────────────────────
function showWelcome() {
  if (hasMessages) return;
  const box = document.getElementById('messages');
  box.innerHTML = `
    <div class="welcome" id="welcomeBlock">
      <div class="welcome-icon">🤖</div>
      <h2>Bonjour${USER_NAME !== 'Employé' ? ', ' + USER_NAME.split(' ')[0] : ''} !</h2>
      <p>Je suis votre assistant RH intelligent. Je peux répondre à toutes vos questions sur les congés, l'onboarding, le règlement intérieur et les procédures internes.</p>
      <div class="welcome-cards">
        <div class="welcome-card" onclick="quickAsk('Comment puis-je poser des congés ?')">
          <div class="card-icon">🌴</div>
          <div class="card-label">Demander des congés</div>
        </div>
        <div class="welcome-card" onclick="quickAsk('Quelles sont les étapes de mon onboarding ?')">
          <div class="card-icon">🎯</div>
          <div class="card-label">Mon onboarding</div>
        </div>
        <div class="welcome-card" onclick="quickAsk('Quels sont mes avantages salariaux ?')">
          <div class="card-icon">💼</div>
          <div class="card-label">Avantages & salaire</div>
        </div>
        <div class="welcome-card" onclick="quickAsk('Quelle est la politique de formation ?')">
          <div class="card-icon">📚</div>
          <div class="card-label">Formations</div>
        </div>
      </div>
    </div>`;
}

// ─── QUICK ASK ───────────────────────────────────────────
function quickAsk(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

// ─── SEND ─────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text  = input.value.trim();
  if (!text) return;
  if (!WEBHOOK_URL) { openConfig(); return; }

  // Remove welcome
  const welcome = document.getElementById('welcomeBlock');
  if (welcome) welcome.remove();
  hasMessages = true;

  input.value = '';
  input.style.height = 'auto';

  // Add date divider if first message
  if (document.querySelectorAll('.msg').length === 0) {
    addDivider();
  }

  // User bubble
  addMessage(text, 'user');

  // Typing indicator
  const typingId = addTyping();

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message:  text,
        userId:   sessionId,
        userName: USER_NAME,
        channel:  'web'
      })
    });

    removeTyping(typingId);

    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    addMessage(data.reply || 'Réponse reçue sans contenu.', 'bot');

  } catch (err) {
    removeTyping(typingId);
    addMessage('⚠️ Impossible de joindre l\'agent RH. Vérifiez la configuration du webhook dans les paramètres.', 'bot', true);
  }
}

// ─── MESSAGES ─────────────────────────────────────────────
function addMessage(text, who, isError=false) {
  const box   = document.getElementById('messages');
  const now   = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  const icon  = who === 'bot' ? '🤖' : (USER_NAME.charAt(0) || '👤');
  const color = isError ? 'color:var(--error)' : '';

  const el = document.createElement('div');
  el.className = `msg ${who}`;
  el.innerHTML = `
    <div class="msg-avatar">${icon}</div>
    <div>
      <div class="msg-bubble" style="${color}">${formatText(text)}</div>
      <div class="msg-meta">${now}</div>
    </div>`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

function addDivider() {
  const box = document.getElementById('messages');
  const now = new Date().toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });
  const el  = document.createElement('div');
  el.className = 'date-divider';
  el.textContent = now;
  box.appendChild(el);
}

function addTyping() {
  const box = document.getElementById('messages');
  const id  = 'typing-' + Date.now();
  const el  = document.createElement('div');
  el.className = 'msg bot';
  el.id = id;
  el.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-bubble" style="padding:0">
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// ─── FORMAT ───────────────────────────────────────────────
function formatText(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,     '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

// ─── UX HELPERS ───────────────────────────────────────────
function handleKey(e) {
